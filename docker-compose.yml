services:
  app:
    build:
      context: ./docker/app
      dockerfile: Dockerfile
    image: materiagris_app:latest
    container_name: materiagris_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/app/conf.d/99-uploads.ini:/usr/local/etc/php/conf.d/99-uploads.ini:ro
      - composer_cache:/tmp/composer
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - appnet

  nginx:
    image: nginx:stable-alpine
    container_name: materiagris_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:delegated
      - ./docker/nginx/vhost.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - appnet

  db:
    image: mysql:8.0
    container_name: materiagris_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "33060:3306"
    networks:
      - appnet

  redis:
    image: redis:7-alpine
    container_name: materiagris_redis
    restart: unless-stopped
    networks:
      - appnet

  mailhog:
    image: mailhog/mailhog
    container_name: materiagris_mailhog
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - appnet

volumes:
  db_data:
  composer_cache:

networks:
  appnet:
    driver: bridge
