; Force Xdebug configuration with higher precedence
[xdebug]
xdebug.mode=debug
xdebug.start_with_request=yes
xdebug.discover_client_host=1
# client_host is kept as fallback but discover is enabled
xdebug.client_host=172.25.9.36
xdebug.client_port=9003
xdebug.idekey=VSCODE
xdebug.log=/tmp/xdebug.log
xdebug.log_level=0
